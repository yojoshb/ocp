apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: rs-worker-scan
  namespace: openshift-compliance
rawResultStorage:
  nodeSelector:
    node-role.kubernetes.io/worker: "" 
  pvAccessModes:
  - ReadWriteOnce
  rotation: 3
  size: 1Gi
  tolerations:
  - operator: Exists 
roles:
- worker
- master
scanTolerations:
  - operator: Exists
schedule: 0 1 * * *
